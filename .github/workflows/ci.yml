name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest
      - name: Unit tests
        run: pytest -q
      - name: Doc tests (offline blocks; api blocks skip without SENSIE_API_KEY)
        run: bash tests/run_doc_tests.sh
      - name: Build + twine check (publish dry-run)
        run: |
          pip install build twine
          python -m build
          twine check dist/*
